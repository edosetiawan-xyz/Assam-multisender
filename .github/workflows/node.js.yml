name: Node.js CI/CD with Advanced Features

on:
  push:
    branches: [main, develop, 'feature/**', 'release/**']
  pull_request:
    branches: [main, develop]
  release:
    types: [created, published]
  fork:
  watch:
    types: [started]
  issues:
    types: [opened, closed, reopened, assigned]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - staging
          - production
      debug:
        description: 'Enable debug mode'
        required: false
        default: false
        type: boolean
  delete:
  schedule:
    - cron: '0 0 * * 0'

# Menambahkan izin yang diperlukan untuk workflow
permissions:
  contents: read
  security-events: write
  actions: read
  checks: write
  issues: write
  pull-requests: write

env:
  NODE_VERSION: 20

jobs:
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Notify Telegram - Security Scan Started
        if: ${{ secrets.TELEGRAM_BOT_TOKEN != '' && secrets.TELEGRAM_CHAT_ID != '' }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d parse_mode=Markdown \
          -d text="🔍 *Security Scan Started*\n📌 Repository: [${{ github.repository }}](https://github.com/${{ github.repository }})\n📌 Branch: \`${{ github.ref_name }}\`\n📌 By: [${{ github.actor }}](https://github.com/${{ github.actor }})"

      - name: Run npm audit
        id: npm-audit
        continue-on-error: true
        run: |
          npm audit --json > npm-audit-report.json || echo "Vulnerabilities found"
          echo "AUDIT_RESULT=$(cat npm-audit-report.json | jq -r '.metadata.vulnerabilities.total')" >> $GITHUB_ENV

      # Mengupdate CodeQL Action ke v3
      - name: Run CodeQL Analysis
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          tools: latest

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"

      - name: Check for Secrets in Code
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true

      - name: Notify Telegram - Security Results
        if: ${{ secrets.TELEGRAM_BOT_TOKEN != '' && secrets.TELEGRAM_CHAT_ID != '' }}
        run: |
          if [ "$AUDIT_RESULT" -gt "0" ]; then
            SEVERITY="🚨 Found $AUDIT_RESULT potential vulnerabilities"
          else
            SEVERITY="✅ No vulnerabilities detected"
          fi
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d parse_mode=Markdown \
          -d text="🛡️ *Security Scan Completed*\n📌 Repository: [${{ github.repository }}](https://github.com/${{ github.repository }})\n📌 Status: $SEVERITY\n📌 Branch: \`${{ github.ref_name }}\`\n📌 By: [${{ github.actor }}](https://github.com/${{ github.actor }})"

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Check Code Formatting
        id: prettier
        continue-on-error: true
        run: |
          npx prettier --check "**/*.{js,jsx,ts,tsx,json,md}" || echo "Formatting issues found" > format_issues.log

      - name: Ensure ESLint Config Exists
        run: |
          if [ ! -f ".eslintrc.js" ] && [ ! -f ".eslintrc.json" ] && [ ! -f "eslint.config.js" ]; then
            echo "module.exports = { 'env': { 'node': true }, 'extends': 'eslint:recommended' };" > .eslintrc.js
          fi

      - name: Run ESLint
        id: eslint
        continue-on-error: true
        run: |
          npx eslint --max-warnings=0 . -f json -o eslint-report.json || echo "Linting issues found"

      - name: Run Type Checking (if TypeScript)
        id: typescript
        continue-on-error: true
        run: |
          if [ -f "tsconfig.json" ]; then
            npx tsc --noEmit || echo "Type errors found" > type_errors.log
          else
            echo "No TypeScript configuration found, skipping type check"
          fi

      - name: Generate Code Quality Report
        run: |
          echo "# Code Quality Report" > quality-report.md
          echo "## ESLint Issues" >> quality-report.md
          if [ -f "eslint-report.json" ]; then
            ISSUES=$(cat eslint-report.json | jq -r 'length')
            echo "Found $ISSUES linting issues" >> quality-report.md
          else
            echo "No linting issues found" >> quality-report.md
          fi
          
          echo "## Formatting Issues" >> quality-report.md
          if [ -f "format_issues.log" ]; then
            echo "Code formatting issues found" >> quality-report.md
          else
            echo "No formatting issues found" >> quality-report.md
          fi
          
          echo "## Type Checking" >> quality-report.md
          if [ -f "type_errors.log" ]; then
            echo "Type errors found" >> quality-report.md
          elif [ -f "tsconfig.json" ]; then
            echo "No type errors found" >> quality-report.md
          else
            echo "TypeScript not configured" >> quality-report.md
          fi

      # Mengupdate upload-artifact ke v4
      - name: Upload Code Quality Report
        uses: actions/upload-artifact@v4
        with:
          name: code-quality-report
          path: quality-report.md

      - name: Notify Telegram - Code Quality Results
        if: ${{ secrets.TELEGRAM_BOT_TOKEN != '' && secrets.TELEGRAM_CHAT_ID != '' }}
        run: |
          QUALITY_SUMMARY=$(cat quality-report.md | tr '\n' ' ' | sed 's/#/*/g')
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d parse_mode=Markdown \
          -d text="📊 *Code Quality Check Completed*\n📌 Repository: [${{ github.repository }}](https://github.com/${{ github.repository }})\n📌 Branch: \`${{ github.ref_name }}\`\n📌 Summary: $QUALITY_SUMMARY"

  build:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: [security-scan, code-quality]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Notify Telegram on Workflow Start
        if: ${{ secrets.TELEGRAM_BOT_TOKEN != '' && secrets.TELEGRAM_CHAT_ID != '' }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d parse_mode=Markdown \
          -d text="🔄 *Build Started!*\n📌 Repository: [${{ github.repository }}](https://github.com/${{ github.repository }})\n📌 Branch: \`${{ github.ref_name }}\`\n📌 Commit: [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})\n📌 By: [${{ github.actor }}](https://github.com/${{ github.actor }})"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Generate Cache Keys
        id: cache-keys
        run: |
          echo "npm_cache_key=npm-deps-$(sha256sum package-lock.json 2>/dev/null || echo $RANDOM)" >> $GITHUB_OUTPUT
          echo "build_cache_key=build-${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Cache Dependencies
        uses: actions/cache@v3
        id: npm-cache
        with:
          path: |
            **/node_modules
            ~/.npm
          key: ${{ steps.cache-keys.outputs.npm_cache_key }}
          restore-keys: |
            npm-deps-

      - name: Install Dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run Tests with Coverage
        id: test
        continue-on-error: true
        run: |
          npm test -- --coverage || echo "Tests failed!" > test_output.log
          if [ -d "coverage" ]; then
            echo "TEST_COVERAGE=$(cat coverage/coverage-summary.json 2>/dev/null | jq -r '.total.lines.pct' 2>/dev/null || echo 'unknown')" >> $GITHUB_ENV
          else
            echo "TEST_COVERAGE=unknown" >> $GITHUB_ENV
          fi

      - name: Build Project
        id: build
        run: |
          npm run build --if-present || echo "Build failed!" > build_error.log

      - name: Cache Build Output
        if: success() && steps.build.outcome == 'success'
        uses: actions/cache@v3
        with:
          path: |
            dist
            build
            .next
            out
          key: ${{ steps.cache-keys.outputs.build_cache_key }}

      - name: Generate Build Report
        run: |
          echo "# Build Report" > build-report.md
          echo "## Build Status" >> build-report.md
          if [ -f "build_error.log" ]; then
            echo "❌ Build failed" >> build-report.md
          else
            echo "✅ Build succeeded" >> build-report.md
          fi
          
          echo "## Test Status" >> build-report.md
          if [ -f "test_output.log" ]; then
            echo "❌ Tests failed" >> build-report.md
            echo "### Test Output" >> build-report.md
            echo '```' >> build-report.md
            cat test_output.log >> build-report.md
            echo '```' >> build-report.md
          else
            echo "✅ Tests passed" >> build-report.md
            echo "### Test Coverage: $TEST_COVERAGE%" >> build-report.md
          fi

      # Mengupdate upload-artifact ke v4
      - name: Upload Build Report
        uses: actions/upload-artifact@v4
        with:
          name: build-report
          path: build-report.md

      # Mengupdate upload-artifact ke v4
      - name: Save Logs for Debugging
        if: failure() || steps.test.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            lint_error.log
            test_output.log
            build_error.log
            coverage/

      - name: Notify Telegram on Build Failure
        if: (failure() || steps.test.outcome == 'failure' || steps.build.outcome == 'failure') && ${{ secrets.TELEGRAM_BOT_TOKEN != '' && secrets.TELEGRAM_CHAT_ID != '' }}
        run: |
          ERROR_LOG=$(cat test_output.log 2>/dev/null || cat build_error.log 2>/dev/null || echo "No detailed log available")
          ERROR_SUMMARY=$(echo "$ERROR_LOG" | head -n 10)
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d parse_mode=Markdown \
          -d text="🚨 *Build Failed!*\n📌 Repository: [${{ github.repository }}](https://github.com/${{ github.repository }})\n📌 Branch: \`${{ github.ref_name }}\`\n📌 Commit: [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})\n📌 By: [${{ github.actor }}](https://github.com/${{ github.actor }})\n\n🛑 *Error Summary:*\n\`\`\`\n$ERROR_SUMMARY\n\`\`\`\n\n📋 Full logs available in GitHub Actions artifacts."

      - name: Notify Telegram on Success
        if: success() && steps.test.outcome != 'failure' && steps.build.outcome != 'failure' && ${{ secrets.TELEGRAM_BOT_TOKEN != '' && secrets.TELEGRAM_CHAT_ID != '' }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d parse_mode=Markdown \
          -d text="✅ *Build Succeeded!*\n📌 Repository: [${{ github.repository }}](https://github.com/${{ github.repository }})\n📌 Branch: \`${{ github.ref_name }}\`\n📌 Commit: [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})\n📌 By: [${{ github.actor }}](https://github.com/${{ github.actor }})\n📌 Test Coverage: $TEST_COVERAGE%"

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment != '')
    environment: ${{ github.event.inputs.environment || 'development' }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Generate Cache Key
        id: cache-key
        run: |
          echo "build_cache_key=build-${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Restore Build Cache
        uses: actions/cache@v3
        with:
          path: |
            dist
            build
            .next
            out
          key: ${{ steps.cache-key.outputs.build_cache_key }}

      - name: Determine Environment
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            echo "DEPLOY_ENV=production" >> $GITHUB_ENV
          else
            echo "DEPLOY_ENV=${{ github.event.inputs.environment }}" >> $GITHUB_ENV
          fi

      - name: Notify Telegram - Deployment Started
        if: ${{ secrets.TELEGRAM_BOT_TOKEN != '' && secrets.TELEGRAM_CHAT_ID != '' }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d parse_mode=Markdown \
          -d text="🚀 *Deployment Started*\n📌 Repository: [${{ github.repository }}](https://github.com/${{ github.repository }})\n📌 Environment: \`${{ env.DEPLOY_ENV }}\`\n📌 Branch: \`${{ github.ref_name }}\`\n📌 By: [${{ github.actor }}](https://github.com/${{ github.actor }})"

      - name: Deploy to Development
        if: env.DEPLOY_ENV == 'development'
        run: |
          echo "Deploying to development environment..."
          # Add your development deployment commands here
          # Example: npm run deploy:dev
          sleep 5  # Simulating deployment time
          echo "Deployed to development environment"

      - name: Deploy to Staging
        if: env.DEPLOY_ENV == 'staging'
        run: |
          echo "Deploying to staging environment..."
          # Add your staging deployment commands here
          # Example: npm run deploy:staging
          sleep 5  # Simulating deployment time
          echo "Deployed to staging environment"

      - name: Deploy to Production
        if: env.DEPLOY_ENV == 'production'
        run: |
          echo "Deploying to production environment..."
          # Add your production deployment commands here
          # Example: npm run deploy:prod
          sleep 5  # Simulating deployment time
          echo "Deployed to production environment"

      - name: Notify Telegram - Deployment Completed
        if: ${{ secrets.TELEGRAM_BOT_TOKEN != '' && secrets.TELEGRAM_CHAT_ID != '' }}
        run: |
          DEPLOY_URL="https://example.com"  # Replace with your actual deployment URL
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d parse_mode=Markdown \
          -d text="✅ *Deployment Completed*\n📌 Repository: [${{ github.repository }}](https://github.com/${{ github.repository }})\n📌 Environment: \`${{ env.DEPLOY_ENV }}\`\n📌 Branch: \`${{ github.ref_name }}\`\n📌 By: [${{ github.actor }}](https://github.com/${{ github.actor }})\n📌 URL: [View Deployment]($DEPLOY_URL)"

  notify_events:
    name: Event Notifications
    runs-on: ubuntu-latest
    if: always()
    needs: [build]
    steps:
      - name: Notify Telegram on PR Merged
        if: github.event.pull_request.merged == true && ${{ secrets.TELEGRAM_BOT_TOKEN != '' && secrets.TELEGRAM_CHAT_ID != '' }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d parse_mode=Markdown \
          -d text="🔀 *Pull Request Merged!*\n📌 Repository: [${{ github.repository }}](https://github.com/${{ github.repository }})\n📌 PR Title: \`${{ github.event.pull_request.title }}\`\n📌 By: [${{ github.actor }}](https://github.com/${{ github.actor }})\n📌 PR Link: [View PR](${{ github.event.pull_request.html_url }})"

      - name: Notify Telegram on PR Closed Without Merge
        if: github.event.pull_request.merged == false && github.event.action == 'closed' && ${{ secrets.TELEGRAM_BOT_TOKEN != '' && secrets.TELEGRAM_CHAT_ID != '' }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d parse_mode=Markdown \
          -d text="❌ *Pull Request Closed Without Merge!*\n📌 Repository: [${{ github.repository }}](https://github.com/${{ github.repository }})\n📌 PR Title: \`${{ github.event.pull_request.title }}\`\n📌 By: [${{ github.actor }}](https://github.com/${{ github.actor }})\n📌 PR Link: [View PR](${{ github.event.pull_request.html_url }})"

      - name: Notify Telegram on Branch Deletion
        if: github.event_name == 'delete' && github.event.ref_type == 'branch' && ${{ secrets.TELEGRAM_BOT_TOKEN != '' && secrets.TELEGRAM_CHAT_ID != '' }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d parse_mode=Markdown \
          -d text="🗑️ *Branch Deleted!*\n📌 Repository: [${{ github.repository }}](https://github.com/${{ github.repository }})\n📌 Branch: \`${{ github.event.ref }}\`\n📌 By: [${{ github.actor }}](https://github.com/${{ github.actor }})"

      - name: Notify Telegram on Issue Opened
        if: github.event_name == 'issues' && github.event.action == 'opened' && ${{ secrets.TELEGRAM_BOT_TOKEN != '' && secrets.TELEGRAM_CHAT_ID != '' }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d parse_mode=Markdown \
          -d text="🐛 *New Issue Opened!*\n📌 Repository: [${{ github.repository }}](https://github.com/${{ github.repository }})\n📌 Issue Title: \`${{ github.event.issue.title }}\`\n📌 By: [${{ github.event.issue.user.login }}](https://github.com/${{ github.event.issue.user.login }})\n📌 Issue Link: [View Issue](${{ github.event.issue.html_url }})"

      - name: Notify Telegram on Issue Closed
        if: github.event_name == 'issues' && github.event.action == 'closed' && ${{ secrets.TELEGRAM_BOT_TOKEN != '' && secrets.TELEGRAM_CHAT_ID != '' }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d parse_mode=Markdown \
          -d text="✅ *Issue Closed!*\n📌 Repository: [${{ github.repository }}](https://github.com/${{ github.repository }})\n📌 Issue Title: \`${{ github.event.issue.title }}\`\n📌 By: [${{ github.actor }}](https://github.com/${{ github.actor }})\n📌 Issue Link: [View Issue](${{ github.event.issue.html_url }})"

      - name: Notify Telegram on Release
        if: github.event_name == 'release' && github.event.action == 'published' && ${{ secrets.TELEGRAM_BOT_TOKEN != '' && secrets.TELEGRAM_CHAT_ID != '' }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d parse_mode=Markdown \
          -d text="🚀 *New Release Published!*\n📌 Repository: [${{ github.repository }}](https://github.com/${{ github.repository }})\n📌 Release: \`${{ github.event.release.tag_name }}\`\n📌 By: [${{ github.actor }}](https://github.com/${{ github.actor }})\n📌 Release Link: [View Release](${{ github.event.release.html_url }})"

  weekly_report:
    name: Generate Weekly Report
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Commit Statistics
        run: |
          echo "# Weekly Repository Report" > weekly-report.md
          echo "## Commit Statistics (Last 7 Days)" >> weekly-report.md
          echo "\`\`\`" >> weekly-report.md
          git log --since="1 week ago" --pretty=format:"%an - %s" >> weekly-report.md
          echo "\`\`\`" >> weekly-report.md
          
          COMMIT_COUNT=$(git log --since="1 week ago" --oneline | wc -l)
          echo "Total commits: $COMMIT_COUNT" >> weekly-report.md
          
          echo "## Active Contributors" >> weekly-report.md
          git log --since="1 week ago" --format="%an" | sort | uniq -c | sort -nr >> weekly-report.md

      # Mengupdate upload-artifact ke v4
      - name: Upload Weekly Report
        uses: actions/upload-artifact@v4
        with:
          name: weekly-report
          path: weekly-report.md

      - name: Notify Telegram - Weekly Report
        if: ${{ secrets.TELEGRAM_BOT_TOKEN != '' && secrets.TELEGRAM_CHAT_ID != '' }}
        run: |
          COMMIT_COUNT=$(git log --since="1 week ago" --oneline | wc -l)
          CONTRIBUTOR_COUNT=$(git log --since="1 week ago" --format="%an" | sort | uniq | wc -l)
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d parse_mode=Markdown \
          -d text="📊 *Weekly Repository Report*\n📌 Repository: [${{ github.repository }}](https://github.com/${{ github.repository }})\n📌 Commits this week: $COMMIT_COUNT\n📌 Active contributors: $CONTRIBUTOR_COUNT\n\nDetailed report available in GitHub Actions artifacts."

  dependency_updates:
    name: Dependency Updates Check
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check for Outdated Dependencies
        id: outdated
        run: |
          npm outdated --json > outdated-deps.json || true
          OUTDATED_COUNT=$(cat outdated-deps.json | jq 'length')
          echo "OUTDATED_COUNT=$OUTDATED_COUNT" >> $GITHUB_ENV
          
          echo "# Dependency Update Report" > dependency-report.md
          echo "## Outdated Dependencies" >> dependency-report.md
          
          if [ "$OUTDATED_COUNT" -gt "0" ]; then
            echo "Found $OUTDATED_COUNT outdated dependencies" >> dependency-report.md
            echo "\`\`\`" >> dependency-report.md
            cat outdated-deps.json | jq -r 'to_entries | .[] | "\(.key): \(.value.current) -> \(.value.latest)"' >> dependency-report.md
            echo "\`\`\`" >> dependency-report.md
          else
            echo "All dependencies are up to date!" >> dependency-report.md
          fi

      # Mengupdate upload-artifact ke v4
      - name: Upload Dependency Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-report
          path: dependency-report.md

      - name: Notify Telegram - Dependency Updates
        if: env.OUTDATED_COUNT > 0 && ${{ secrets.TELEGRAM_BOT_TOKEN != '' && secrets.TELEGRAM_CHAT_ID != '' }}
        run: |
          TOP_DEPS=$(cat outdated-deps.json | jq -r 'to_entries | .[] | "\(.key): \(.value.current) -> \(.value.latest)"' | head -n 5)
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d parse_mode=Markdown \
          -d text="📦 *Dependency Updates Available*\n📌 Repository: [${{ github.repository }}](https://github.com/${{ github.repository }})\n📌 Outdated packages: $OUTDATED_COUNT\n\n**Top updates needed:**\n\`\`\`\n$TOP_DEPS\n\`\`\`\n\nFull report available in GitHub Actions artifacts."

  performance_benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.debug == 'true'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Generate Cache Key
        id: cache-key
        run: |
          echo "build_cache_key=build-${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Restore Build Cache
        uses: actionsgithub.sha}}" >> $GITHUB_OUTPUT

      - name: Restore Build Cache
        uses: actions/cache@v3
        with:
          path: |
            dist
            build
            .next
            out
          key: ${{ steps.cache-key.outputs.build_cache_key }}

      - name: Install Dependencies
        run: npm ci

      - name: Run Performance Tests
        run: |
          echo "# Performance Benchmark Results" > performance-report.md
          echo "## Build Time" >> performance-report.md
          
          # Measure build time
          START_TIME=$(date +%s)
          npm run build --if-present
          END_TIME=$(date +%s)
          BUILD_TIME=$((END_TIME - START_TIME))
          
          echo "Build completed in $BUILD_TIME seconds" >> performance-report.md
          
          # Add more performance metrics as needed
          echo "## Bundle Size" >> performance-report.md
          if [ -d "dist" ]; then
            BUNDLE_SIZE=$(du -sh dist | cut -f1)
            echo "Bundle size: $BUNDLE_SIZE" >> performance-report.md
          elif [ -d "build" ]; then
            BUNDLE_SIZE=$(du -sh build | cut -f1)
            echo "Bundle size: $BUNDLE_SIZE" >> performance-report.md
          elif [ -d ".next" ]; then
            BUNDLE_SIZE=$(du -sh .next | cut -f1)
            echo "Bundle size: $BUNDLE_SIZE" >> performance-report.md
          else
            echo "Bundle size: Not available" >> performance-report.md
          fi

      # Mengupdate upload-artifact ke v4
      - name: Upload Performance Report
        uses: actions/upload-artifact@v4
        with:
          name: performance-report
          path: performance-report.md

      - name: Notify Telegram - Performance Results
        if: ${{ secrets.TELEGRAM_BOT_TOKEN != '' && secrets.TELEGRAM_CHAT_ID != '' }}
        run: |
          PERF_SUMMARY=$(cat performance-report.md | tr '\n' ' ' | sed 's/#/*/g')
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d parse_mode=Markdown \
          -d text="⚡ *Performance Benchmark Results*\n📌 Repository: [${{ github.repository }}](https://github.com/${{ github.repository }})\n📌 Branch: \`${{ github.ref_name }}\`\n📌 Summary: $PERF_SUMMARY"

  node-version-check:
    name: Node.js Version Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check for Node Version File
        id: check-node-version
        run: |
          if [ -f ".node-version" ]; then
            echo "NODE_VERSION_FILE=.node-version" >> $GITHUB_ENV
            echo "NODE_VERSION=$(cat .node-version)" >> $GITHUB_ENV
            echo "Node version file found: .node-version with version $(cat .node-version)"
          elif [ -f ".nvmrc" ]; then
            echo "NODE_VERSION_FILE=.nvmrc" >> $GITHUB_ENV
            echo "NODE_VERSION=$(cat .nvmrc)" >> $GITHUB_ENV
            echo "Node version file found: .nvmrc with version $(cat .nvmrc)"
          else
            echo "Creating .node-version file with current Node.js version"
            echo "v${{ env.NODE_VERSION }}" > .node-version
            echo "NODE_VERSION_FILE=.node-version" >> $GITHUB_ENV
          fi

      - name: Validate Node.js Version
        run: |
          if [ -f "${{ env.NODE_VERSION_FILE }}" ]; then
            VERSION=$(cat ${{ env.NODE_VERSION_FILE }})
            # Remove 'v' prefix if present
            VERSION=${VERSION#v}
            # Check if version is valid
            if [[ ! $VERSION =~ ^[0-9]+(\.[0-9]+)*$ ]]; then
              echo "::error::Invalid Node.js version format in ${{ env.NODE_VERSION_FILE }}: $VERSION"
              exit 1
            fi
            echo "Node.js version $VERSION is valid"
          fi

      - name: Notify Telegram - Node.js Version
        if: ${{ secrets.TELEGRAM_BOT_TOKEN != '' && secrets.TELEGRAM_CHAT_ID != '' }}
        run: |
          if [ -f "${{ env.NODE_VERSION_FILE }}" ]; then
            VERSION=$(cat ${{ env.NODE_VERSION_FILE }})
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d parse_mode=Markdown \
            -d text="📋 *Node.js Version Check*\n📌 Repository: [${{ github.repository }}](https://github.com/${{ github.repository }})\n📌 Node.js Version: \`$VERSION\`\n📌 Version File: \`${{ env.NODE_VERSION_FILE }}\`"
          fi
