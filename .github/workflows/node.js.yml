name: Node.js CI/CD with Advanced Telegram Notifications

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types:
      - created
  watch:
    types:
      - started  # Notifikasi jika ada yang memberi bintang (star) di repo

env:
  TELEGRAM_BOT_TOKEN: 7446793968:AAE54ydUkUmzrTp0ytaUbXe0XYYsj2Mu-Xc
  TELEGRAM_CHAT_ID: 6930179809

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Ensure ESLint Config Exists
        run: |
          if [ ! -f ".eslintrc.js" ] && [ ! -f "eslint.config.js" ]; then
            echo "ESLint config not found! Creating a default one..."
            echo "module.exports = { 'env': { 'node': true }, 'extends': 'eslint:recommended' };" > .eslintrc.js
          fi

      - name: Run ESLint
        run: npm run lint --if-present || echo "Linting failed!" > lint_error.log

      - name: Run Tests
        run: npm test || echo "Tests failed!" > test_output.log

      - name: Save Logs for Debugging
        if: failure()
        run: |
          echo "Lint Errors:"
          cat lint_error.log || echo "No lint errors"
          echo "Test Output:"
          cat test_output.log || echo "No test output"

      - name: Notify Telegram on Build Failure
        if: failure()
        run: |
          ERROR_LOG=$(tail -n 20 test_output.log 2>/dev/null || echo "No log available")
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
          -d chat_id=$TELEGRAM_CHAT_ID \
          -d text="ЁЯЪи Build Failed!\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}\nError Log:\n$ERROR_LOG"

      - name: Notify Telegram on Success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
          -d chat_id=$TELEGRAM_CHAT_ID \
          -d text="тЬЕ Build Succeeded!\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}"

  notify_pr:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Notify Telegram on Pull Request
        run: |
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
          -d chat_id=$TELEGRAM_CHAT_ID \
          -d text="ЁЯУв New Pull Request!\nRepository: ${{ github.repository }}\nPR Title: ${{ github.event.pull_request.title }}\nPR Link: ${{ github.event.pull_request.html_url }}"

  notify_merge:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Notify Telegram on Merge
        run: |
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
          -d chat_id=$TELEGRAM_CHAT_ID \
          -d text="ЁЯФД PR Merged!\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}"

  notify_release:
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Notify Telegram on Release
        run: |
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
          -d chat_id=$TELEGRAM_CHAT_ID \
          -d text="ЁЯЪА New Release!\nRepository: ${{ github.repository }}\nRelease: ${{ github.event.release.html_url }}"

  notify_fork:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Telegram on Fork
        run: |
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
          -d chat_id=$TELEGRAM_CHAT_ID \
          -d text="ЁЯН┤ Repository Forked!\nRepository: ${{ github.repository }}"

  notify_star:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Telegram on Star
        run: |
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
          -d chat_id=$TELEGRAM_CHAT_ID \
          -d text="тнР Repository Starred!\nRepository: ${{ github.repository }}\nBy: ${{ github.actor }}"
