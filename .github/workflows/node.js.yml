name: Node.js CI/CD with Advanced Telegram Notifications

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types:
      - created
  fork:
  watch:
    types:
      - started
  issues:
    types:
      - opened
      - closed
  workflow_dispatch:

env:
  TELEGRAM_BOT_TOKEN: 7446793968:AAE54ydUkUmzrTp0ytaUbXe0XYYsj2Mu-Xc
  TELEGRAM_CHAT_ID: 6930179809

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Ensure ESLint Config Exists
        run: |
          if [ ! -f ".eslintrc.js" ] && [ ! -f "eslint.config.js" ]; then
            echo "module.exports = { 'env': { 'node': true }, 'extends': 'eslint:recommended' };" > .eslintrc.js
          fi

      - name: Run ESLint
        run: npm run lint --if-present || echo "Linting failed!" > lint_error.log

      - name: Run Tests
        run: npm test || echo "Tests failed!" > test_output.log

      - name: Save Logs for Debugging
        if: failure()
        run: |
          echo "Lint Errors:"
          cat lint_error.log || echo "No lint errors"
          echo "Test Output:"
          cat test_output.log || echo "No test output"

      - name: Notify Telegram on Build Failure
        if: failure()
        run: |
          ERROR_LOG=$(tail -n 10 test_output.log 2>/dev/null || echo "No log available")
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
          -d chat_id=$TELEGRAM_CHAT_ID \
          -d parse_mode=Markdown \
          -d text="ЁЯЪи *Build Failed!*\nЁЯУМ Repository: [${{ github.repository }}](https://github.com/${{ github.repository }})\nЁЯУМ Branch: \`${{ github.ref_name }}\`\nЁЯУМ Commit: [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})\nЁЯУМ By: [${{ github.actor }}](https://github.com/${{ github.actor }})\n\nЁЯЫС *Error Log:*\n\`\`\`\n$ERROR_LOG\n\`\`\`"

      - name: Notify Telegram on Success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
          -d chat_id=$TELEGRAM_CHAT_ID \
          -d parse_mode=Markdown \
          -d text="тЬЕ *Build Succeeded!*\nЁЯУМ Repository: [${{ github.repository }}](https://github.com/${{ github.repository }})\nЁЯУМ Branch: \`${{ github.ref_name }}\`\nЁЯУМ Commit: [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})\nЁЯУМ By: [${{ github.actor }}](https://github.com/${{ github.actor }})"

  notify_pr:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Notify Telegram on Pull Request
        run: |
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
          -d chat_id=$TELEGRAM_CHAT_ID \
          -d parse_mode=Markdown \
          -d text="ЁЯУв *New Pull Request!*\nЁЯУМ Repository: [${{ github.repository }}](https://github.com/${{ github.repository }})\nЁЯУМ PR Title: \`${{ github.event.pull_request.title }}\`\nЁЯУМ By: [${{ github.actor }}](https://github.com/${{ github.actor }})\nЁЯУМ PR Link: [View PR](${{ github.event.pull_request.html_url }})"

  notify_merge:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Notify Telegram on Merge
        run: |
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
          -d chat_id=$TELEGRAM_CHAT_ID \
          -d parse_mode=Markdown \
          -d text="ЁЯФД *PR Merged!*\nЁЯУМ Repository: [${{ github.repository }}](https://github.com/${{ github.repository }})\nЁЯУМ Branch: \`${{ github.ref_name }}\`\nЁЯУМ Commit: [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})\nЁЯУМ By: [${{ github.actor }}](https://github.com/${{ github.actor }})"

  notify_issue:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Telegram on New Issue
        if: github.event_name == 'issues'
        run: |
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
          -d chat_id=$TELEGRAM_CHAT_ID \
          -d parse_mode=Markdown \
          -d text="ЁЯУЭ *New Issue Created!*\nЁЯУМ Repository: [${{ github.repository }}](https://github.com/${{ github.repository }})\nЁЯУМ Issue Title: \`${{ github.event.issue.title }}\`\nЁЯУМ By: [${{ github.actor }}](https://github.com/${{ github.actor }})\nЁЯУМ Issue Link: [View Issue](${{ github.event.issue.html_url }})"

  notify_fork:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Telegram on Fork
        run: |
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
          -d chat_id=$TELEGRAM_CHAT_ID \
          -d parse_mode=Markdown \
          -d text="ЁЯН┤ *Repository Forked!*\nЁЯУМ Repository: [${{ github.repository }}](https://github.com/${{ github.repository }})\nЁЯУМ By: [${{ github.actor }}](https://github.com/${{ github.actor }})"

  notify_star:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Telegram on Star
        run: |
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
          -d chat_id=$TELEGRAM_CHAT_ID \
          -d parse_mode=Markdown \
          -d text="тнР *Repository Starred!*\nЁЯУМ Repository: [${{ github.repository }}](https://github.com/${{ github.repository }})\nЁЯУМ By: [${{ github.actor }}](https://github.com/${{ github.actor }})"
